}
.header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--line);
  flex-wrap: wrap;
  gap: 16px;
}
.title-block h1 {
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 10px;
}
.title-block h1 .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
}
.title-block .sub {
  font-size: 13px;
  color: var(--ink-3);
  margin-top: 6px;
  font-family: "JetBrains Mono", monospace;
}
.header-right {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.sync-status {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11.5px;
  color: var(--ink-3);
  font-family: "JetBrains Mono", monospace;
  padding: 4px 10px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 12px;
}
.sync-status .sync-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--ink-4);
}
.sync-status.synced .sync-dot { background: #4A9B7E; }
.sync-status.syncing .sync-dot {
  background: #D4A03E;
  animation: pulse 1s infinite;
}
.sync-status.error .sync-dot { background: var(--danger); }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
.week-nav {
  display: flex;
  gap: 4px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 4px;
}
.week-nav button {
  background: transparent;
  border: none;
  padding: 7px 12px;
  font-size: 13px;
  font-family: inherit;
  color: var(--ink-2);
  cursor: pointer;
  border-radius: var(--r-sm);
  display: flex;
  align-items: center;
  gap: 4px;
}
.week-nav button:hover { background: var(--surface-2); color: var(--ink); }
.week-nav button.today { font-weight: 500; }
.tabs {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 0;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 4px;
  margin-bottom: 24px;
  overflow-x: auto;
}
.tab {
  background: transparent;
  border: none;
  padding: 10px 8px;
  font-size: 12.5px;
  font-family: inherit;
  color: var(--ink-3);
  cursor: pointer;
  border-radius: var(--r-sm);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  position: relative;
  min-width: 0;
  transition: all 0.15s;
}
.tab i { font-size: 18px; color: var(--ink-4); transition: color 0.15s; }
.tab:hover { background: var(--surface-2); color: var(--ink-2); }
.tab:hover i { color: var(--ink-3); }
.tab.active { background: var(--accent); color: #fff; }
.tab.active i { color: #fff; }
.tab .badge {
  position: absolute;
  top: 4px;
  right: 6px;
  background: var(--warn);
  color: #fff;
  font-size: 10px;
  font-weight: 500;
  padding: 1px 5px;
  border-radius: 8px;
  min-width: 16px;
  text-align: center;
}
.tab.active .badge { background: rgba(255,255,255,0.25); }
.tab-name {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}
.meeting-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 12px;
}
.meeting-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 600;
  color: var(--ink);
}
.meeting-title i { font-size: 20px; color: var(--accent); }
.stats {
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: var(--ink-3);
  font-family: "JetBrains Mono", monospace;
}
.stats span strong { color: var(--ink); font-weight: 500; }
.add-form {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 12px;
  margin-bottom: 20px;
  display: grid;
  grid-template-columns: 1fr 160px 110px auto;
  gap: 8px;
  box-shadow: var(--shadow-sm);
}
.add-form input, .add-form select {
  font-family: inherit;
  font-size: 13.5px;
  padding: 9px 12px;
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  background: var(--bg);
  color: var(--ink);
  outline: none;
  transition: all 0.15s;
}
.add-form input:focus, .add-form select:focus {
  border-color: var(--accent);
  background: #fff;
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.add-form input::placeholder { color: var(--ink-4); }
.btn {
  font-family: inherit;
  font-size: 13px;
  padding: 9px 14px;
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  background: var(--surface);
  color: var(--ink-2);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-weight: 500;
  white-space: nowrap;
  transition: all 0.15s;
}
.btn:hover {
  background: var(--surface-2);
  border-color: var(--line-2);
  color: var(--ink);
}
.btn.primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn.primary:hover {
  background: var(--accent-ink);
  border-color: var(--accent-ink);
  color: #fff;
}
.btn i { font-size: 15px; }
.section-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-3);
  margin: 24px 0 10px;
  font-family: "JetBrains Mono", monospace;
}
.section-label .line { flex: 1; height: 1px; background: var(--line); }
.section-label .num {
  background: var(--surface-2);
  padding: 1px 7px;
  border-radius: 8px;
  font-size: 10px;
  color: var(--ink-2);
}
.list { display: flex; flex-direction: column; gap: 6px; }
.item {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 12px 14px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  transition: all 0.15s;
  position: relative;
}
.item:hover { border-color: var(--line-2); box-shadow: var(--shadow-sm); }
.item.priority-high { border-left: 3px solid var(--warn); }
.item.priority-info { border-left: 3px solid var(--info); }
.item.done { background: transparent; border-color: var(--line); }
.item.done .text { text-decoration: line-through; color: var(--ink-4); }
.check {
  flex-shrink: 0;
  width: 20px;
  height: 20px;
  border-radius: 5px;
  border: 1.5px solid var(--line-2);
  background: var(--bg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
  transition: all 0.15s;
  padding: 0;
  color: #fff;
}
.check:hover { border-color: var(--accent); }
.check.checked { background: var(--accent); border-color: var(--accent); }
.check.checked i { font-size: 13px; }
.body { flex: 1; min-width: 0; }
.text {
  font-size: 14px;
  color: var(--ink);
  word-break: break-word;
  white-space: pre-wrap;
  line-height: 1.5;
}
.meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 6px;
  font-size: 12px;
  color: var(--ink-3);
  flex-wrap: wrap;
}
.owner { display: inline-flex; align-items: center; gap: 4px; }
.owner i { font-size: 13px; }
.pill {
  display: inline-block;
  padding: 1px 8px;
  font-size: 10.5px;
  border-radius: 8px;
  font-weight: 500;
}
.pill.high { background: var(--warn-soft); color: var(--warn); }
.pill.info { background: var(--info-soft); color: var(--info); }
.actions {
  display: flex;
  gap: 2px;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.15s;
}
.item:hover .actions { opacity: 1; }
.icon-btn {
  background: transparent;
  border: none;
  cursor: pointer;
  color: var(--ink-4);
  padding: 5px;
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.icon-btn:hover { background: var(--surface-2); color: var(--ink); }
.icon-btn.danger:hover { background: #FCE9E9; color: var(--danger); }
.icon-btn i { font-size: 15px; }
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--ink-4);
  font-size: 13px;
  border: 1px dashed var(--line);
  border-radius: var(--r-md);
  background: var(--surface);
}
.empty i {
  font-size: 28px;
  display: block;
  margin-bottom: 8px;
  color: var(--line-2);
}
.footer-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 32px;
  padding-top: 20px;
  border-top: 1px solid var(--line);
  flex-wrap: wrap;
  gap: 8px;
}
.footer-actions .left, .footer-actions .right {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--ink);
  color: #fff;
  padding: 10px 18px;
  border-radius: var(--r-md);
  font-size: 13px;
  box-shadow: var(--shadow-md);
  opacity: 0;
  transition: all 0.25s;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 6px;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast i { color: #7FCFB3; }
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(26,26,23,0.4);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
  padding: 16px;
}
.modal-bg.show { display: flex; }
.modal {
  background: #fff;
  border-radius: var(--r-lg);
  padding: 24px;
  width: 100%;
  max-width: 460px;
  box-shadow: 0 20px 60px rgba(26,26,23,0.2);
}
.modal h3 { font-size: 16px; margin-bottom: 16px; font-weight: 600; }
.modal-grid { display: grid; gap: 10px; margin-bottom: 18px; }
.modal label {
  font-size: 11px;
  color: var(--ink-3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
  display: block;
  font-family: "JetBrains Mono", monospace;
}
.modal input, .modal select, .modal textarea {
  width: 100%;
  font-family: inherit;
  font-size: 13.5px;
  padding: 9px 12px;
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  background: var(--bg);
  outline: none;
}
.modal textarea { resize: vertical; min-height: 80px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; }

.login-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 32px 28px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 8px 32px rgba(26,26,23,0.12);
}
.login-card h2 {
  font-size: 20px;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
}
.login-card h2 .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
}
.login-card .sub {
  font-size: 12.5px;
  color: var(--ink-3);
  margin-bottom: 24px;
  font-family: "JetBrains Mono", monospace;
}
.login-field { margin-bottom: 12px; }
.login-field label {
  display: block;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-3);
  margin-bottom: 4px;
  font-family: "JetBrains Mono", monospace;
}
.login-field input {
  width: 100%;
  font-family: inherit;
  font-size: 14px;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  background: var(--bg);
  color: var(--ink);
  outline: none;
}
.login-field input:focus {
  border-color: var(--accent);
  background: #fff;
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.login-btn {
  width: 100%;
  padding: 11px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--r-sm);
  cursor: pointer;
  margin-top: 8px;
}
.login-btn:hover { background: var(--accent-ink); }
.login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.login-error {
  background: #FCE9E9;
  color: var(--danger);
  font-size: 12.5px;
  padding: 8px 12px;
  border-radius: var(--r-sm);
  margin-top: 12px;
  display: none;
}
.login-error.show { display: block; }
.login-link {
  display: block;
  text-align: center;
  margin-top: 16px;
  font-size: 12.5px;
  color: var(--ink-3);
  text-decoration: none;
  cursor: pointer;
}
.login-link:hover { color: var(--accent); text-decoration: underline; }

/* Loading Screen */
.loading-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 600;
  flex-direction: column;
  gap: 12px;
}
.loading-screen .spinner {
  width: 28px; height: 28px;
  border: 2.5px solid var(--line);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loading-screen .msg {
  font-size: 13px;
  color: var(--ink-3);
  font-family: "JetBrains Mono", monospace;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 768px) {
  body { padding: 20px 14px 60px; }
  .app::before { height: 140px; margin: -20px -14px 16px; }
  .tabs { grid-template-columns: repeat(4, 1fr); }
  .add-form { grid-template-columns: 1fr; }
  .tab-name { font-size: 11.5px; }
  .header { flex-direction: column; align-items: stretch; }
  .header-right { justify-content: space-between; }
  .actions { opacity: 1; }
}
.item.dragging { opacity: 0.4; }
.item.drag-over { border-top: 2px solid var(--accent); }
.sr-only {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div class="spinner"></div>
  <div class="msg">접속 확인 중...</div>
</div>

<div class="toast" id="toast"><i class="ti ti-check"></i><span id="toast-msg"></span></div>

<script>
const MEETINGS = [
  {id:"team_ops_weekly", name:"팀 실무", full:"팀 실무 주간회의", icon:"ti-briefcase"},
  {id:"team_weekly", name:"팀 주간", full:"팀 주간회의", icon:"ti-users"},
  {id:"app_task", name:"APP 과제", full:"APP 과제 회의", icon:"ti-device-mobile"},
  {id:"lead_weekly", name:"리드 주간", full:"리드 주간회의", icon:"ti-crown"},
  {id:"kw_task_weekly", name:"KW 과제", full:"KW 과제 주간회의", icon:"ti-target"},
  {id:"new_currency_weekly", name:"신규재화", full:"신규재화 주간회의", icon:"ti-coin"},
  {id:"personal_todo", name:"개인 To Do", full:"개인 To Do", icon:"ti-user-check"}
];

const STORAGE_KEY = "weekly_agenda_data_v1";
const STATE_KEY = "weekly_agenda_state_v1";

let data = {};
let state = loadState();
let editingId = null;
let isApplyingRemote = false;
let saveTimer = null;
let unsubscribe = null;

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}
function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    const s = raw ? JSON.parse(raw) : {};
    return { currentMeeting: s.currentMeeting || MEETINGS[0].id, weekOffset: 0 };
  } catch(e) { return { currentMeeting: MEETINGS[0].id, weekOffset: 0 }; }
}
function saveState() {
  localStorage.setItem(STATE_KEY, JSON.stringify({ currentMeeting: state.currentMeeting }));
}
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  scheduleCloudSave();
}
function scheduleCloudSave() {
  if (isApplyingRemote) return;
  setSyncStatus("syncing", "저장 중");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(cloudSave, 400);
}
async function cloudSave() {
  if (!window.firebaseAuth || !window.firebaseAuth.currentUser) {
    setSyncStatus("error", "오프라인");
    return;
  }
  try {
    const uid = window.firebaseAuth.currentUser.uid;
    const dbRef = window.firebaseRef(window.firebaseDb, "users/" + uid + "/data");
    await window.firebaseSet(dbRef, {
      payload: JSON.stringify(data),
      updatedAt: Date.now()
    });
    setSyncStatus("synced", "동기화됨");
  } catch(e) {
    console.error("Cloud save failed", e);
    setSyncStatus("error", "저장 실패");
  }
}
function setSyncStatus(status, text) {
  const el = document.getElementById("sync-status");
  const txt = document.getElementById("sync-text");
  if (!el) return;
  el.classList.remove("synced", "syncing", "error");
  el.classList.add(status);
  txt.textContent = text;
}
function subscribeRemote() {
  if (!window.firebaseAuth || !window.firebaseAuth.currentUser) return;
  const uid = window.firebaseAuth.currentUser.uid;
  const dbRef = window.firebaseRef(window.firebaseDb, "users/" + uid + "/data");
  unsubscribe = window.firebaseOnValue(dbRef, (snapshot) => {
    const val = snapshot.val();
    if (!val) {
      if (Object.keys(data).length > 0) cloudSave();
      else setSyncStatus("synced", "동기화됨");
      return;
    }
    try {
      const remote = JSON.parse(val.payload || "{}");
      isApplyingRemote = true;
      data = remote;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      renderAll();
      isApplyingRemote = false;
      setSyncStatus("synced", "동기화됨");
    } catch(e) {
      console.error("Apply remote failed", e);
      isApplyingRemote = false;
    }
  }, (err) => {
    console.error("Subscribe error", err);
    setSyncStatus("error", "연결 오류");
  });
}

function getCurrentDate() {
  const d = new Date();
  d.setDate(d.getDate() + state.weekOffset * 7);
  return d;
}
function getWeekKey(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const weekNum = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return d.getUTCFullYear() + "-W" + String(weekNum).padStart(2, "0");
}
function getWeekRange(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const monday = new Date(d);
  monday.setDate(diff);
  const sunday = new Date(monday);
  sunday.setDate(sunday.getDate() + 6);
  const yr = monday.getFullYear();
  const fmt = x => String(x.getMonth()+1).padStart(2,"0") + "." + String(x.getDate()).padStart(2,"0");
  return yr + "." + fmt(monday) + " ~ " + fmt(sunday);
}
function getItems(weekKey, meetingId) {
  if (!data[weekKey]) data[weekKey] = {};
  if (!data[weekKey][meetingId]) data[weekKey][meetingId] = [];
  return data[weekKey][meetingId];
}
function setItems(weekKey, meetingId, items) {
  if (!data[weekKey]) data[weekKey] = {};
  data[weekKey][meetingId] = items;
  saveData();
}
function escapeHtml(s) {
  return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function showToast(msg) {
  const t = document.getElementById("toast");
  document.getElementById("toast-msg").textContent = msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove("show"), 2000);
}
function renderTabs() {
  const wrap = document.getElementById("tabs");
  const weekKey = getWeekKey(getCurrentDate());
  wrap.innerHTML = MEETINGS.map(m => {
    const items = getItems(weekKey, m.id);
    const open = items.filter(x => !x.done).length;
    const isActive = state.currentMeeting === m.id;
    return `
      <button class="tab ${isActive ? "active" : ""}" data-id="${m.id}">
        <i class="ti ${m.icon}"></i>
        <span class="tab-name">${m.name}</span>
        ${open > 0 ? `<span class="badge">${open}</span>` : ""}
      </button>
    `;
  }).join("");
  wrap.querySelectorAll(".tab").forEach(btn => {
    btn.onclick = () => {
      state.currentMeeting = btn.dataset.id;
      saveState();
      renderAll();
    };
  });
}
function renderHeader() {
  const date = getCurrentDate();
  document.getElementById("week-label").textContent = getWeekRange(date) + "  ·  " + getWeekKey(date);
  const m = MEETINGS.find(x => x.id === state.currentMeeting);
  document.getElementById("meeting-title").innerHTML = `<i class="ti ${m.icon}"></i>${m.full}`;
}
function priorityPill(p) {
  if (p === "high") return '<span class="pill high">중요</span>';
  if (p === "info") return '<span class="pill info">공유</span>';
  return "";
}
function buildItem(item) {
  const div = document.createElement("div");
  div.className = "item" + (item.done ? " done" : "") +
    (item.priority === "high" ? " priority-high" : "") +
    (item.priority === "info" ? " priority-info" : "");
  div.draggable = !item.done;
  div.dataset.id = item.id;
  div.innerHTML = `
    <button class="check ${item.done ? "checked" : ""}" aria-label="완료">
      ${item.done ? '<i class="ti ti-check"></i>' : ""}
    </button>
    <div class="body">
      <div class="text">${escapeHtml(item.text)}</div>
      ${(item.owner || item.priority !== "normal") ? `
        <div class="meta">
          ${item.owner ? `<span class="owner"><i class="ti ti-user"></i>${escapeHtml(item.owner)}</span>` : ""}
          ${priorityPill(item.priority)}
        </div>
      ` : ""}
    </div>
    <div class="actions">
      <button class="icon-btn edit" aria-label="수정"><i class="ti ti-pencil"></i></button>
      <button class="icon-btn danger del" aria-label="삭제"><i class="ti ti-trash"></i></button>
    </div>
  `;
  div.querySelector(".check").onclick = () => toggleItem(item.id);
  div.querySelector(".del").onclick = () => deleteItem(item.id);
  div.querySelector(".edit").onclick = () => openEdit(item.id);

  div.addEventListener("dragstart", (e) => {
    div.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
    e.dataTransfer.setData("text/plain", item.id);
  });
  div.addEventListener("dragend", () => div.classList.remove("dragging"));
  div.addEventListener("dragover", (e) => {
    e.preventDefault();
    div.classList.add("drag-over");
  });
  div.addEventListener("dragleave", () => div.classList.remove("drag-over"));
  div.addEventListener("drop", (e) => {
    e.preventDefault();
    div.classList.remove("drag-over");
    const fromId = e.dataTransfer.getData("text/plain");
    if (fromId !== item.id) reorderItem(fromId, item.id);
  });
  return div;
}
function renderList() {
  const weekKey = getWeekKey(getCurrentDate());
  const items = getItems(weekKey, state.currentMeeting);
  const open = items.filter(x => !x.done);
  const done = items.filter(x => x.done);

  document.getElementById("stats").innerHTML =
    `<span>진행 <strong>${open.length}</strong></span>` +
    `<span>완료 <strong>${done.length}</strong></span>` +
    `<span>전체 <strong>${items.length}</strong></span>`;
  document.getElementById("open-count").textContent = open.length;
  document.getElementById("done-count").textContent = done.length;

  const openList = document.getElementById("open-list");
  const doneList = document.getElementById("done-list");
  openList.innerHTML = "";
  doneList.innerHTML = "";

  if (open.length === 0) {
    openList.innerHTML = '<div class="empty"><i class="ti ti-clipboard-list"></i>아젠다를 추가해주세요</div>';
  } else {
    open.forEach(item => openList.appendChild(buildItem(item)));
  }
  document.getElementById("done-section").style.display = done.length ? "block" : "none";
  done.forEach(item => doneList.appendChild(buildItem(item)));
}
function renderAll() {
  renderHeader();
  renderTabs();
  renderList();
}
function addItem() {
  const textEl = document.getElementById("new-text");
  const ownerEl = document.getElementById("new-owner");
  const prioEl = document.getElementById("new-priority");
  const text = textEl.value.trim();
  if (!text) { textEl.focus(); return; }
  const weekKey = getWeekKey(getCurrentDate());
  const items = getItems(weekKey, state.currentMeeting);
  items.push({
    id: Date.now() + "_" + Math.random().toString(36).slice(2,7),
    text,
    owner: ownerEl.value.trim(),
    priority: prioEl.value,
    done: false,
    createdAt: new Date().toISOString()
  });
  setItems(weekKey, state.currentMeeting, items);
  textEl.value = ""; ownerEl.value = ""; prioEl.value = "normal";
  renderList(); renderTabs();
  textEl.focus();
}
function toggleItem(id) {
  const weekKey = getWeekKey(getCurrentDate());
  const items = getItems(weekKey, state.currentMeeting);
  const it = items.find(x => x.id === id);
  if (it) {
    it.done = !it.done;
    if (it.done) it.completedAt = new Date().toISOString();
  }
  setItems(weekKey, state.currentMeeting, items);
  renderList(); renderTabs();
}
function deleteItem(id) {
  if (!confirm("이 아젠다를 삭제할까요?")) return;
  const weekKey = getWeekKey(getCurrentDate());
  let items = getItems(weekKey, state.currentMeeting);
  items = items.filter(x => x.id !== id);
  setItems(weekKey, state.currentMeeting, items);
  renderList(); renderTabs();
}
function openEdit(id) {
  const weekKey = getWeekKey(getCurrentDate());
  const items = getItems(weekKey, state.currentMeeting);
  const it = items.find(x => x.id === id);
  if (!it) return;
  editingId = id;
  document.getElementById("edit-text").value = it.text;
  document.getElementById("edit-owner").value = it.owner || "";
  document.getElementById("edit-priority").value = it.priority || "normal";
  document.getElementById("edit-modal").classList.add("show");
  setTimeout(() => document.getElementById("edit-text").focus(), 50);
}
function saveEdit() {
  if (!editingId) return;
  const weekKey = getWeekKey(getCurrentDate());
  const items = getItems(weekKey, state.currentMeeting);
  const it = items.find(x => x.id === editingId);
  if (!it) return;
  const newText = document.getElementById("edit-text").value.trim();
  if (!newText) return;
  it.text = newText;
  it.owner = document.getElementById("edit-owner").value.trim();
  it.priority = document.getElementById("edit-priority").value;
  setItems(weekKey, state.currentMeeting, items);
  closeEdit();
  renderList();
}
function closeEdit() {
  editingId = null;
  document.getElementById("edit-modal").classList.remove("show");
}
function reorderItem(fromId, toId) {
  const weekKey = getWeekKey(getCurrentDate());
  const items = getItems(weekKey, state.currentMeeting);
  const fromIdx = items.findIndex(x => x.id === fromId);
  const toIdx = items.findIndex(x => x.id === toId);
  if (fromIdx < 0 || toIdx < 0) return;
  const [moved] = items.splice(fromIdx, 1);
  items.splice(toIdx, 0, moved);
  setItems(weekKey, state.currentMeeting, items);
  renderList();
}
async function copyMinutes() {
  const weekKey = getWeekKey(getCurrentDate());
  const date = getCurrentDate();
  const items = getItems(weekKey, state.currentMeeting);
  const m = MEETINGS.find(x => x.id === state.currentMeeting);
  let txt = `[${m.full}]  ${getWeekRange(date)}\n${"─".repeat(40)}\n\n`;
  txt += `■ 진행할 아젠다\n`;
  const open = items.filter(x => !x.done);
  if (open.length === 0) txt += "  (없음)\n";
  else open.forEach((x, i) => {
    let tag = "";
    if (x.priority === "high") tag = " [중요]";
    if (x.priority === "info") tag = " [공유]";
    txt += `  ${i+1}. ${x.text}${x.owner ? ` (${x.owner})` : ""}${tag}\n`;
  });
  const done = items.filter(x => x.done);
  if (done.length) {
    txt += `\n■ 완료\n`;
    done.forEach((x, i) => {
      txt += `  ${i+1}. ${x.text}${x.owner ? ` (${x.owner})` : ""}\n`;
    });
  }
  try {
    await navigator.clipboard.writeText(txt);
    showToast("회의록이 복사되었습니다");
  } catch(e) { prompt("복사할 텍스트:", txt); }
}
function carryOver() {
  const weekKey = getWeekKey(getCurrentDate());
  const items = getItems(weekKey, state.currentMeeting);
  const open = items.filter(x => !x.done);
  if (open.length === 0) { showToast("미완료 항목이 없습니다"); return; }
  if (!confirm(`미완료 ${open.length}개 항목을 다음 주로 옮길까요?`)) return;
  const nextDate = new Date(getCurrentDate());
  nextDate.setDate(nextDate.getDate() + 7);
  const nextKey = getWeekKey(nextDate);
  const nextItems = getItems(nextKey, state.currentMeeting);
  open.forEach(x => {
    nextItems.push({
      ...x,
      id: Date.now() + "_" + Math.random().toString(36).slice(2,7),
      done: false,
      carriedFrom: weekKey
    });
  });
  const remaining = items.filter(x => x.done);
  setItems(weekKey, state.currentMeeting, remaining);
  setItems(nextKey, state.currentMeeting, nextItems);
  renderAll();
  showToast(`${open.length}개 항목을 다음 주로 옮겼습니다`);
}
function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const today = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `meeting-agenda-backup-${today}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast("백업 파일을 저장했습니다");
}
function importData(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (typeof imported !== "object") throw new Error();
      if (!confirm("기존 데이터에 합쳐서 가져옵니다. 진행할까요?")) return;
      Object.keys(imported).forEach(weekKey => {
        if (!data[weekKey]) data[weekKey] = {};
        Object.keys(imported[weekKey]).forEach(meetingId => {
          if (!data[weekKey][meetingId]) data[weekKey][meetingId] = [];
          imported[weekKey][meetingId].forEach(item => {
            if (!data[weekKey][meetingId].find(x => x.id === item.id)) {
              data[weekKey][meetingId].push(item);
            }
          });
        });
      });
      saveData();
      renderAll();
      showToast("데이터를 가져왔습니다");
    } catch(e) { alert("파일 형식이 올바르지 않습니다"); }
  };
  reader.readAsText(file);
}

// Event bindings
document.getElementById("add-btn").onclick = addItem;
document.getElementById("new-text").addEventListener("keydown", e => { if (e.key === "Enter") addItem(); });
document.getElementById("new-owner").addEventListener("keydown", e => { if (e.key === "Enter") addItem(); });
document.getElementById("prev-week").onclick = () => { state.weekOffset--; renderAll(); };
document.getElementById("next-week").onclick = () => { state.weekOffset++; renderAll(); };
document.getElementById("this-week").onclick = () => { state.weekOffset = 0; renderAll(); };
document.getElementById("copy-btn").onclick = copyMinutes;
document.getElementById("carry-btn").onclick = carryOver;
document.getElementById("export-btn").onclick = exportData;
document.getElementById("import-btn").onclick = () => document.getElementById("import-file").click();
document.getElementById("import-file").onchange = (e) => {
  if (e.target.files[0]) importData(e.target.files[0]);
  e.target.value = "";
};
document.getElementById("edit-cancel").onclick = closeEdit;
document.getElementById("edit-save").onclick = saveEdit;
document.getElementById("edit-modal").onclick = (e) => { if (e.target.id === "edit-modal") closeEdit(); };
document.addEventListener("keydown", (e) => { if (e.key === "Escape" && editingId) closeEdit(); });

// Firebase Auth flow
function setupAuth() {
  const loadingScreen = document.getElementById("loading-screen");
  const loginScreen = document.getElementById("login-screen");
  const appEl = document.querySelector(".app");
  const emailEl = document.getElementById("login-email");
  const passwordEl = document.getElementById("login-password");
  const loginBtn = document.getElementById("login-btn");
  const errorEl = document.getElementById("login-error");
  const forgotLink = document.getElementById("forgot-link");
  const logoutBtn = document.getElementById("logout-btn");

  function showError(msg, isSuccess) {
    errorEl.textContent = msg;
    errorEl.classList.add("show");
    if (isSuccess) {
      errorEl.style.background = "#E8EFE9";
      errorEl.style.color = "#1A3329";
    } else {
      errorEl.style.background = "";
      errorEl.style.color = "";
    }
  }
  function hideError() { errorEl.classList.remove("show"); }

  async function attemptLogin() {
    const email = emailEl.value.trim();
    const password = passwordEl.value;
    if (!email || !password) { showError("이메일과 비밀번호를 모두 입력해주세요."); return; }
    hideError();
    loginBtn.disabled = true;
    loginBtn.textContent = "로그인 중...";
    try {
      await window.firebaseSignIn(window.firebaseAuth, email, password);
    } catch(e) {
      let msg = "로그인에 실패했습니다.";
      const code = e.code || "";
      if (code.includes("invalid-credential") || code.includes("wrong-password") || code.includes("user-not-found")) {
        msg = "이메일 또는 비밀번호가 올바르지 않습니다.";
      } else if (code.includes("invalid-email")) {
        msg = "이메일 형식이 올바르지 않습니다.";
      } else if (code.includes("too-many-requests")) {
        msg = "잠시 후 다시 시도해주세요.";
      } else if (code.includes("network")) {
        msg = "네트워크 연결을 확인해주세요.";
      }
      showError(msg);
      loginBtn.disabled = false;
      loginBtn.textContent = "로그인";
    }
  }

  loginBtn.onclick = attemptLogin;
  emailEl.addEventListener("keydown", e => { if (e.key === "Enter") passwordEl.focus(); });
  passwordEl.addEventListener("keydown", e => { if (e.key === "Enter") attemptLogin(); });

  forgotLink.onclick = async () => {
    const email = emailEl.value.trim();
    if (!email) { showError("이메일을 먼저 입력해주세요."); return; }
    try {
      await window.firebaseSendPasswordReset(window.firebaseAuth, email);
      showError("재설정 메일을 보냈습니다. 메일함을 확인해주세요.", true);
    } catch(e) { showError("재설정 메일 발송에 실패했습니다."); }
  };

  logoutBtn.onclick = async () => {
    if (!confirm("로그아웃 하시겠어요?")) return;
    if (unsubscribe) { unsubscribe(); unsubscribe = null; }
    await window.firebaseSignOut(window.firebaseAuth);
  };

  window.firebaseOnAuthStateChanged(window.firebaseAuth, (user) => {
    loadingScreen.style.display = "none";
    if (user) {
      loginScreen.style.display = "none";
      appEl.classList.add("ready");
      loginBtn.disabled = false;
      loginBtn.textContent = "로그인";
      passwordEl.value = "";
      hideError();
      // 로컬 캐시 즉시 로드
      data = loadData();
      renderAll();
      // 클라우드 구독
      setSyncStatus("syncing", "연결 중");
      subscribeRemote();
    } else {
      loginScreen.style.display = "flex";
      appEl.classList.remove("ready");
      data = {};
    }
  });
}

if (window.firebaseReady) {
  setupAuth();
} else {
  window.addEventListener("firebase-ready", setupAuth);
}
</script>
</body>
</html>
